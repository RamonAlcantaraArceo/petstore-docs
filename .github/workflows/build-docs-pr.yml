name: Build Docs (PR)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GithubAccessToken: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Checkout mkdocstrings source dependency
        run: |
          git clone --depth 1 --branch main https://github.com/RamonAlcantaraArceo/petstore-test-python.git ../petstore-test-python

      - name: Build docs site
        run: uv run mkdocs build -c
